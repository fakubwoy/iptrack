[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium"

[deploy]
startCommand = "gunicorn wsgi:app --workers 2 --worker-class sync --threads 2 --timeout 120 --bind 0.0.0.0:$PORT --max-requests 500 --max-requests-jitter 50 --preload"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3