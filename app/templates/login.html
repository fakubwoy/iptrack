{% extends "base.html" %}
{% block title %}Login – IPTrack India{% endblock %}
{% block content %}
<style>
  .auth-wrap { max-width: 420px; margin: 3rem auto; }
  .auth-wrap h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: .4rem; }
  .auth-wrap p.sub { color: var(--text-muted); font-size: .9rem; margin-bottom: 1.75rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: .85rem; font-weight: 500; color: var(--text-muted); margin-bottom: .4rem; }
  input[type=email], input[type=password], input[type=text] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .65rem .9rem;
    color: var(--text);
    font-size: .95rem;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  .check-row { display: flex; align-items: center; gap: .5rem; margin-bottom: 1.2rem; font-size: .875rem; }
  .check-row input { width: auto; }
  .bottom-link { margin-top: 1rem; text-align: center; font-size: .875rem; color: var(--text-muted); }
  .bottom-link a { color: var(--accent); text-decoration: none; }
</style>
<div class="auth-wrap">
  <h1>Welcome back</h1>
  <p class="sub">Log in to track your IP filings.</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="check-row">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember" style="margin:0;color:var(--text);">Remember me</label>
      </div>
      <button class="btn btn-primary" style="width:100%;" type="submit">Log in</button>
    </form>
  </div>
  <p class="bottom-link">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
</div>
{% endblock %}
